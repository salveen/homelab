---
- name: Install k3s server (control-plane)
  hosts: control_plane
  become: true

  tasks:
    - name: Install k3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_EXEC="server \
            --disable=traefik \
            --disable=servicelb \
            --write-kubeconfig-mode=644 \
            --node-taint=node-role.kubernetes.io/control-plane=true:NoSchedule \
            --tls-san={{ ansible_default_ipv4.address }}" \
          sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node-token to be readable
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node-token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_b64

    - name: Stash token + server address as facts on this host
      ansible.builtin.set_fact:
        k3s_token: "{{ k3s_token_b64.content | b64decode | trim }}"
        k3s_server: "https://{{ ansible_default_ipv4.address }}:6443"

    - name: Fetch kubeconfig to localhost
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env', 'HOME') }}/.kube/homelab-config"
        flat: true

    - name: Rewrite server address in kubeconfig
      delegate_to: localhost
      become: false
      ansible.builtin.replace:
        path: "{{ lookup('env', 'HOME') }}/.kube/homelab-config"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "{{ k3s_server }}"


- name: Install k3s agents (workers)
  hosts: workers
  become: true

  vars:
    k3s_token: "{{ hostvars[groups['control_plane'][0]]['k3s_token'] }}"
    k3s_server: "{{ hostvars[groups['control_plane'][0]]['k3s_server'] }}"

  tasks:
    - name: Install k3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL={{ k3s_server }} \
          K3S_TOKEN={{ k3s_token }} \
          sh -
      args:
        creates: /usr/local/bin/k3s-agent


- name: Wait for cluster to be Ready
  hosts: control_plane
  become: true
  tasks:
    - name: Wait for all nodes Ready
      ansible.builtin.shell: |
        kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          wait --for=condition=Ready node --all --timeout=300s
      changed_when: false
