---
# Same pattern, but for actual workloads under kubernetes/apps/<name>/.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/salveen/homelab.git
        revision: main
        directories:
          - path: kubernetes/apps/*
  template:
    metadata:
      name: "app-{{ .path.basename }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/salveen/homelab.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .path.basename }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
